<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 160" width="680" height="160">
  <defs>
    <radialGradient id="bgGrad2" cx="45%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#2a1654"/>
      <stop offset="100%" stop-color="#06040f"/>
    </radialGradient>
    <linearGradient id="clawGrad2" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#e0aaff"/>
      <stop offset="55%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="clawGlow2" x="-30%" y="-20%" width="160%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dollarGlow2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#10b981" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect width="160" height="160" rx="34" fill="url(#bgGrad2)"/>
  <rect width="160" height="160" rx="34" fill="none" stroke="rgba(168,85,247,0.18)" stroke-width="1.5"/>

  <!-- Three tapered claw marks (scaled to 160x160) -->

  <!-- Claw 1 -->
  <path
    d="M 41 37 A 5.6 5.6 0 0 1 52 37 C 52 64 47 95 40 126 C 43 95 42 64 41 37 Z"
    fill="url(#clawGrad2)"
    filter="url(#clawGlow2)"
  />

  <!-- Claw 2 (center, taller) -->
  <path
    d="M 72 31 A 5.6 5.6 0 0 1 83 31 C 83 61 78 94 70 130 C 74 94 73 61 72 31 Z"
    fill="url(#clawGrad2)"
    filter="url(#clawGlow2)"
  />

  <!-- Claw 3 -->
  <path
    d="M 104 37 A 5.6 5.6 0 0 1 115 37 C 115 64 110 95 102 126 C 106 95 105 64 104 37 Z"
    fill="url(#clawGrad2)"
    filter="url(#clawGlow2)"
  />

  <!-- Dollar accent -->
  <text
    x="118"
    y="142"
    font-family="-apple-system, 'Inter', 'Helvetica Neue', sans-serif"
    font-size="29"
    font-weight="800"
    fill="#10b981"
    filter="url(#dollarGlow2)"
  >$</text>

  <!-- Wordmark -->
  <text
    x="186"
    y="108"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="800"
    letter-spacing="-2"
    fill="#f0f0f4"
  >Claw<tspan fill="#a855f7">Cost</tspan></text>
</svg>
