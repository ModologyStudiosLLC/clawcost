  />
  <path
    d="M 26 11 C 23 18 22 27 25 36 C 27 41 28 44 26 50"
    fill="none" stroke="url(#claw2)" stroke-width="4.5" stroke-linecap="round"
  />
  <path
    d="M 36 13 C 33 20 32 29 35 38 C 37 43 38 46 36 52"
    fill="none" stroke="url(#claw2)" stroke-width="4.5" stroke-linecap="round"
  />

  <!-- Dollar accent -->
  <text x="50" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#10b981">$</text>

  <!-- Wordmark -->
  <text
    x="78"
    y="41"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#f0f0f4"
  >Claw<tspan fill="#a855f7">Cost</tspan></text>
