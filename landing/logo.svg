<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" width="220" height="64">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1230"/>
      <stop offset="100%" stop-color="#0d0a18"/>
    </linearGradient>
    <linearGradient id="claw2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect width="64" height="64" rx="14" fill="url(#bg2)"/>

  <!-- Three claw slashes -->
  <path
