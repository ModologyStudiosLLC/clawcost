<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#07080c"/>
    </radialGradient>
    <linearGradient id="clawGrad" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#ffd060"/>
      <stop offset="45%" stop-color="#e8961e"/>
      <stop offset="100%" stop-color="#a86010"/>
    </linearGradient>
    <filter id="clawGlow" x="-35%" y="-20%" width="170%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16" result="blur"/>
      <feFlood flood-color="#e8961e" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dollarGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feFlood flood-color="#00d47e" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="108" fill="none" stroke="rgba(232,150,30,0.15)" stroke-width="2"/>

  <!-- Three tapered claw marks -->

  <!-- Claw 1 (left) -->
  <path
    d="M 132 118 A 18 18 0 0 1 168 118 C 167 205 153 305 128 402 C 138 305 134 205 132 118 Z"
    fill="url(#clawGrad)"
    filter="url(#clawGlow)"
  />

  <!-- Claw 2 (center, slightly taller) -->
  <path
    d="M 232 98 A 18 18 0 0 1 268 98 C 267 192 252 298 224 418 C 236 298 233 192 232 98 Z"
    fill="url(#clawGrad)"
    filter="url(#clawGlow)"
  />

  <!-- Claw 3 (right) -->
  <path
    d="M 332 118 A 18 18 0 0 1 368 118 C 367 205 353 305 328 402 C 338 305 334 205 332 118 Z"
    fill="url(#clawGrad)"
    filter="url(#clawGlow)"
  />

  <!-- Dollar sign — green accent, bottom right -->
  <text
    x="375"
    y="452"
    font-family="-apple-system, 'Inter', 'Helvetica Neue', sans-serif"
    font-size="92"
    font-weight="800"
    fill="#00d47e"
    filter="url(#dollarGlow)"
  >$</text>
</svg>
