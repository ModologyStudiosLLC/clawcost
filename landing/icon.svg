<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1230"/>
      <stop offset="100%" stop-color="#0d0a18"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Three claw slashes — each is a tapered curved stroke -->
  <!-- Left slash -->
  <path
    d="M 16 14 C 14 20 13 28 16 36 C 17 40 18 43 16 48"
    fill="none"
    stroke="url(#claw)"
    stroke-width="4.5"
    stroke-linecap="round"
  />
  <!-- Middle slash -->
  <path
    d="M 26 11 C 23 18 22 27 25 36 C 27 41 28 44 26 50"
    fill="none"
    stroke="url(#claw)"
    stroke-width="4.5"
    stroke-linecap="round"
  />
  <!-- Right slash -->
  <path
    d="M 36 13 C 33 20 32 29 35 38 C 37 43 38 46 36 52"
    fill="none"
    stroke="url(#claw)"
    stroke-width="4.5"
    stroke-linecap="round"
  />

  <!-- Dollar mark — small, bottom right, green accent -->
  <text
    x="50"
    y="54"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="13"
    font-weight="700"
    fill="#10b981"
  >$</text>
</svg>
