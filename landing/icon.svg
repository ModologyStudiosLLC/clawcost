<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="45%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#2a1654"/>
      <stop offset="100%" stop-color="#06040f"/>
    </radialGradient>
    <linearGradient id="clawGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#e0aaff"/>
      <stop offset="55%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="clawGlow" x="-30%" y="-20%" width="160%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dollarGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#10b981" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect width="512" height="512" rx="108" fill="none" stroke="rgba(168,85,247,0.18)" stroke-width="2"/>

  <!-- Three tapered claw marks — filled paths with rounded top arc, tapering to sharp tip -->

  <!-- Claw 1 (left) -->
  <path
    d="M 132 118 A 18 18 0 0 1 168 118 C 167 205 153 305 128 402 C 138 305 134 205 132 118 Z"
    fill="url(#clawGrad)"
    filter="url(#clawGlow)"
  />

  <!-- Claw 2 (center, slightly taller) -->
  <path
    d="M 232 98 A 18 18 0 0 1 268 98 C 267 192 252 298 224 418 C 236 298 233 192 232 98 Z"
    fill="url(#clawGrad)"
    filter="url(#clawGlow)"
  />

  <!-- Claw 3 (right) -->
  <path
    d="M 332 118 A 18 18 0 0 1 368 118 C 367 205 353 305 328 402 C 338 305 334 205 332 118 Z"
    fill="url(#clawGrad)"
    filter="url(#clawGlow)"
  />

  <!-- Dollar sign — green accent, bottom right -->
  <text
    x="375"
    y="452"
    font-family="-apple-system, 'Inter', 'Helvetica Neue', sans-serif"
    font-size="92"
    font-weight="800"
    fill="#10b981"
    filter="url(#dollarGlow)"
  >$</text>
</svg>
